<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Blog - Girls and Women Foundation Liberia</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Page Header -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="container">
        <div class="posts-layout">
            <!-- Single Post Display -->
            <div class="posts-feed">
                <!-- Single Post Container -->
                <div id="singlePostContainer"></div>

                <!-- Navigation Controls -->
                <div class="post-navigation">
                    <button id="prevBtn" class="nav-btn prev-btn" title="Previous Post">
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <div class="post-counter">
                        <span id="currentPostNumber">1</span> / <span id="totalPostsNumber">4</span>
                    </div>
                    <button id="nextBtn" class="nav-btn next-btn" title="Next Post">
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <!-- Loading Spinner -->
                <div id="loadingSpinner" class="loading-spinner hidden">
                    <div class="spinner"></div>
                    <p>Loading post...</p>
                </div>

                <!-- No Posts Message -->
                <div id="noPostsMessage" class="no-posts hidden">
                    <i class="fas fa-newspaper"></i>
                    <h3>No posts available</h3>
                    <p>Check back later for new posts!</p>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- Popular Topics -->
                <div class="sidebar-widget">
                    <h3>Popular Topics</h3>
                    <div class="topics-list">
                        <a href="#" class="topic-tag" data-tag="education">
                            <i class="fas fa-graduation-cap"></i> Education
                        </a>
                        <a href="#" class="topic-tag" data-tag="healthcare">
                            <i class="fas fa-heartbeat"></i> Healthcare
                        </a>
                        <a href="#" class="topic-tag" data-tag="entrepreneurship">
                            <i class="fas fa-briefcase"></i> Entrepreneurship
                        </a>
                        <a href="#" class="topic-tag" data-tag="advocacy">
                            <i class="fas fa-bullhorn"></i> Advocacy
                        </a>
                        <a href="#" class="topic-tag" data-tag="volunteer">
                            <i class="fas fa-hands-helping"></i> Volunteer Stories
                        </a>
                        <a href="#" class="topic-tag" data-tag="fundraising">
                            <i class="fas fa-hand-holding-usd"></i> Fundraising
                        </a>
                    </div>
                </div>

                <!-- Recent Activities -->
                <div class="sidebar-widget">
                    <h3>Recent Activities</h3>
                    <div class="activities-list" id="sidebarActivities">
                        <!-- Dynamically loaded by single-post.js -->
                        <div style="padding:16px;text-align:center;color:#6b7280;">
                            <i class="fas fa-spinner fa-spin" style="font-size:1.2em;"></i>
                            <p style="margin-top:6px;font-size:.85em;">Loading activities…</p>
                        </div>
                    </div>
                </div>

                <!-- Newsletter -->
                <div class="sidebar-widget newsletter-widget">
                    <h3>Stay Updated</h3>
                    <p>Subscribe to get the latest posts in your inbox</p>
                    <form class="newsletter-form">
                        <input type="email" placeholder="Your email address" required>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-envelope"></i> Subscribe
                        </button>
                    </form>
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript -->
    <script src="../js/main.js"></script>
    <script src="../js/load.js"></script>
    <script src="../js/single-post.js"></script>
</body>
</html>
