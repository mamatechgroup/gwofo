<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subscriptions - Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-dashboard">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-hands-helping"></i> Foundation Admin</h2>
        </div>
        
        <nav class="admin-menu">
            <a href="dashboard.html" class="menu-item">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            
            <a href="manage-posts.html" class="menu-item">
                <i class="fas fa-newspaper"></i>
                <span>Posts</span>
            </a>
            
            <a href="manage-projects.html" class="menu-item">
                <i class="fas fa-project-diagram"></i>
                <span>Projects</span>
            </a>
            
            <a href="manage-team.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span>Team</span>
            </a>
            
            <a href="manage-partners.html" class="menu-item">
                <i class="fas fa-handshake"></i>
                <span>Partners</span>
            </a>
            
            <a href="manage-slides.html" class="menu-item">
                <i class="fas fa-images"></i>
                <span>Homepage Slides</span>
            </a>
            
            <a href="manage-subscriptions.html" class="menu-item active">
                <i class="fas fa-envelope"></i>
                <span>Subscriptions</span>
            </a>
            
            <a href="settings.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </nav>
        
        <button class="logout-btn" title="Logout from Admin Dashboard">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <!-- Top Bar -->
        <div class="admin-topbar">
            <div class="topbar-left">
                <button class="mobile-toggle" title="Toggle Navigation Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Newsletter Subscriptions</h1>
            </div>
            
            <div class="topbar-right">
                <div class="admin-profile">
                    <div class="profile-img">
                        <span>A</span>
                    </div>
                    <div class="profile-info">
                        <span class="profile-name">Admin User</span>
                        <span class="profile-role">Administrator</span>
                    </div>
                </div>
                
                <div class="search-box">
                    <input type="text" class="search-input" placeholder="Search subscriptions...">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="content-section">
            <div class="section-header">
                <div class="filters">
                    <select class="filter-select" title="Filter by Status">
                        <option value="all">All Status</option>
                        <option value="active">Active</option>
                        <option value="unsubscribed">Unsubscribed</option>
                    </select>
                </div>
                
                <button class="btn-add" title="Export Subscriptions">
                    <i class="fas fa-download"></i> Export
                </button>
            </div>
            
            <!-- Subscriptions Table -->
            <div class="table-container">
                <table class="data-table" id="subscriptionsTable">
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Full Name</th>
                            <th>Subscribe Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data loaded from API -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="bulk-actions">
                <div class="pagination">
                    <span class="pagination-info">Loading subscriptions...</span>
                    <button class="pagination-btn" disabled aria-label="Previous page">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button class="pagination-btn active">1</button>
                    <button class="pagination-btn" aria-label="Next page">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Subscription Statistics -->
        <div class="content-grid">
            <div class="content-section">
                <h3>Subscription Statistics</h3>
                <div class="stats-summary">
                    <div class="stat-item">
                        <div class="stat-number">0</div>
                        <div class="stat-label">Total Subscribers</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">0</div>
                        <div class="stat-label">Active</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">0</div>
                        <div class="stat-label">Unsubscribed</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/manage-subscriptions.js"></script>
</body>
</html>
