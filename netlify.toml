[build]
  command = "echo 'Frontend ready for deployment'"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  REACT_APP_API_URL = "https://gwofo.onrender.com/api"

[context.deploy-preview.environment]
  REACT_APP_API_URL = "https://gwofo.onrender.com/api"

[context.branch-deploy.environment]
  REACT_APP_API_URL = "https://gwofo.onrender.com/api"

[dev]
  command = "echo 'Start your dev server locally'"
  port = 8000
